# 中国大学毕业论文（设计）格式
# 基于 GB/T 7714-2015 参考文献标准
# 适用于：本科毕业论文、硕士学位论文、博士学位论文

description: "中国大学毕业论文 - GB/T 7714 参考文献标准"

format_rules:
  font:
    chinese: "宋体"
    english: "Times New Roman"
    heading_chinese: "黑体"

  headings:
    heading1:   # 章标题：黑体，二号，居中，加粗
      font_size: 16
      bold: true
      align: "center"
      space_before: 24
      space_after: 18
      line_spacing: 1.5
    heading2:   # 节标题：黑体，三号，左对齐，加粗
      font_size: 14
      bold: true
      align: "left"
      space_before: 18
      space_after: 12
      line_spacing: 1.5
    heading3:   # 小节标题：黑体，四号，左对齐，加粗
      font_size: 12
      bold: true
      align: "left"
      space_before: 12
      space_after: 6
      line_spacing: 1.5

  body_text:
    font_size: 12       # 小四
    line_spacing: 1.5
    first_line_indent: 2
    align: "justify"

  margins:
    top: 2.54
    bottom: 2.54
    left: 3.17
    right: 3.17

  abstract:
    title_font_size: 16   # 二号
    title_bold: true
    title_align: "center"
    content_font_size: 12 # 小四
    content_line_spacing: 1.5
    content_first_line_indent: 0

  keywords:
    label: "关键词："
    font_size: 12
    bold_label: true
    separator: "；"

  title_page:
    title_font_size: 22
    title_bold: true
    title_align: "center"
    author_font_size: 12
    author_align: "center"
    affiliation_font_size: 10.5  # 五号
    affiliation_align: "center"

  references:
    style: "GB/T 7714"
    font_size: 10.5     # 五号
    line_spacing: 1.25
    hanging_indent: true
    numbering: "sequential"
    templates:
      journal: "[{num}] {authors}. {title}[J]. {journal}, {year}, {volume}({number}): {pages}."
      book: "[{num}] {authors}. {title}[M]. {city}: {publisher}, {year}: {pages}."
      conference: "[{num}] {authors}. {title}[C]//{proceedings}. {city}: {publisher}, {year}: {pages}."
      thesis: "[{num}] {author}. {title}[D]. {city}: {university}, {year}."
      online: "[{num}] {authors}. {title}[EB/OL]. ({year}-{month}-{day})[{access_date}]. {url}."

  figures:
    label: "图"
    numbering: "chapter"
    separator: "-"
    caption_position: "below"
    font_size: 10.5
    align: "center"

  tables:
    label: "表"
    numbering: "chapter"
    separator: "-"
    caption_position: "above"
    font_size: 10.5
    header_bold: true
    align: "center"

  formulas:
    numbering: true
    numbering_style: "paren"
    numbering_position: "right"
    font_size: 12

  header_footer:
    enabled: true
    header:
      text: ""
      font_size: 10.5
      font_name: "宋体"
      align: "center"
      bottom_border: true
    footer:
      page_number: true
      font_size: 10.5
      align: "center"
    different_first_page: true
    different_odd_even: false

  page_numbering:
    enabled: true
    front_matter:
      style: "roman_lower"
      start: 1
    body:
      style: "arabic"
      start: 1
    position: "footer_center"

  toc:
    enabled: true
    title: "目  录"
    title_font_size: 16
    title_bold: true
    title_align: "center"
    max_level: 3
    font_size: 12
    line_spacing: 1.5

auto_detect:
  title_pattern: "^论文题目[:：]?|^题目[:：]?"
  chapter_pattern: "^第[一二三四五六七八九十百零\\d]+[章部分篇]"
  section_pattern: "^\\d+\\.\\d+"
  subsection_pattern: "^\\d+\\.\\d+\\.\\d+"
  abstract_pattern: "^摘\\s*要$|^Abstract$|^ABSTRACT$"
  abstract_en_pattern: "^Abstract$|^ABSTRACT$"
  keywords_pattern: "^关键词[:：]|^Key\\s*[Ww]ords[:：]?"
  reference_keywords:
    - "参考文献"
    - "参考资料"
    - "References"
    - "REFERENCES"
  acknowledgment_pattern: "^致\\s*谢$|^Acknowledge?ments?$"
  appendix_pattern: "^附\\s*录[A-Z]?"
  figure_caption_pattern: "^图\\s*\\d"
  table_caption_pattern: "^表\\s*\\d"
  formula_pattern: "^\\(?\\d+[-\\.]\\d+\\)?$"
