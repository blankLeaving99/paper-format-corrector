# APA 7th Edition Format
# Based on APA Publication Manual, 7th Edition
# Suitable for: Psychology, Education, Social Sciences journals

description: "APA 第7版 - 心理学/社会科学论文格式"

format_rules:
  font:
    chinese: "宋体"
    english: "Times New Roman"
    heading_chinese: "黑体"

  headings:
    heading1:   # Level 1: Centered, Bold, Title Case
      font_size: 12
      bold: true
      align: "center"
      space_before: 24
      space_after: 12
      line_spacing: 2.0
    heading2:   # Level 2: Flush Left, Bold, Title Case
      font_size: 12
      bold: true
      align: "left"
      space_before: 24
      space_after: 12
      line_spacing: 2.0
    heading3:   # Level 3: Flush Left, Bold Italic, Title Case
      font_size: 12
      bold: true
      italic: true
      align: "left"
      space_before: 24
      space_after: 12
      line_spacing: 2.0

  body_text:
    font_size: 12
    line_spacing: 2.0
    first_line_indent: 2
    align: "left"

  margins:
    top: 2.54
    bottom: 2.54
    left: 2.54
    right: 2.54

  abstract:
    title_font_size: 12
    title_bold: true
    title_align: "center"
    content_font_size: 12
    content_line_spacing: 2.0
    content_first_line_indent: 0

  keywords:
    label: "Keywords: "
    font_size: 12
    bold_label: true
    separator: ", "

  title_page:
    title_font_size: 12
    title_bold: true
    title_align: "center"
    author_font_size: 12
    author_align: "center"
    affiliation_font_size: 12
    affiliation_align: "center"

  references:
    style: "APA"
    font_size: 12
    line_spacing: 2.0
    hanging_indent: true
    numbering: "none"
    templates:
      journal: "{authors} ({year}). {title}. {journal}, {volume}({number}), {pages}."
      book: "{authors} ({year}). {title}. {publisher}."
      conference: "{authors} ({year}). {title}. In {proceedings} (pp. {pages}). {publisher}."
      online: "{authors} ({year}). {title}. {url}"
      thesis: "{author} ({year}). {title} [Doctoral dissertation, {university}]. {url}"

  figures:
    label: "Figure"
    numbering: "sequential"
    separator: "."
    caption_position: "below"
    font_size: 12
    align: "left"

  tables:
    label: "Table"
    numbering: "sequential"
    separator: " "
    caption_position: "above"
    font_size: 12
    header_bold: true
    align: "left"

  formulas:
    numbering: true
    numbering_style: "paren"
    numbering_position: "right"
    font_size: 12

  header_footer:
    enabled: true
    header:
      text: "Running head: SHORT TITLE"
      font_size: 12
      font_name: "Times New Roman"
      align: "left"
      bottom_border: false
    footer:
      page_number: true
      font_size: 12
      align: "right"
    different_first_page: true

  toc:
    enabled: false

auto_detect:
  title_pattern: "^.*$"
  chapter_pattern: "^(Introduction|Method|Results|Discussion|Conclusion|References)[s]?$"
  section_pattern: "^(Introduction|Method|Results|Discussion|Conclusion)[s]?$"
  subsection_pattern: "^[A-Z][a-z]+(?:\\s+[A-Z][a-z]+)*$"
  abstract_pattern: "^Abstract$|^ABSTRACT$|^摘\\s*要$"
  abstract_en_pattern: "^Abstract$|^ABSTRACT$"
  keywords_pattern: "^Keywords[:：]?|^Key\\s*[Ww]ords[:：]?|^关键词[:：]"
  reference_keywords:
    - "References"
    - "REFERENCES"
  acknowledgment_pattern: "^Acknowledge?ments?$|^致\\s*谢$"
  appendix_pattern: "^Appendix\\s*[A-Z]?"
  figure_caption_pattern: "^Figure\\s+\\d|^Fig\\.?\\s*\\d"
  table_caption_pattern: "^Table\\s+\\d"
  formula_pattern: "^\\(?\\d+\\)?$"
